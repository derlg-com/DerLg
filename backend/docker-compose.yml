# =============================================================================
# DerLg Backend — Development Docker Compose
# =============================================================================
# Development uses Supabase for PostgreSQL, so this file only provides Redis.
# Run: docker compose up -d
# =============================================================================

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: derlg-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: derlg_dev
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - derlg-dev

  redis:
    image: redis:8.6-alpine
    container_name: derlg-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - derlg-dev

networks:
  derlg-dev:
    driver: bridge
