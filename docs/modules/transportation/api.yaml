openapi: 3.0.3
info:
  title: DerLg — Transportation API
  version: 1.0.0
  description: Vehicle inventory, availability checking, and transportation booking management.

servers:
  - url: http://localhost:3001/v1
    description: Local development

paths:
  /transportation/vehicles:
    get:
      summary: List available transportation vehicles
      tags: [Transportation]
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - name: type
          in: query
          description: Filter by vehicle type
          schema:
            type: string
            enum: [VAN, BUS, TUK_TUK, PRIVATE_CAR]
        - name: q
          in: query
          description: Free-text search (min 2 chars)
          schema:
            type: string
            minLength: 2
        - name: sort
          in: query
          schema:
            type: string
        - name: lang
          in: query
          schema:
            type: string
            enum: [en, zh, km]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 50
      responses:
        '200':
          description: Paginated list of vehicles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedVehicles'

  /transportation/vehicles/{id}:
    get:
      summary: Get vehicle detail
      tags: [Transportation]
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Vehicle detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Vehicle'
        '404':
          description: Vehicle not found (TRANS_NOT_FOUND)

  /transportation/vehicles/{id}/availability:
    get:
      summary: Check vehicle availability for date range
      description: |
        Check if a specific vehicle is available for the given date range.
        Date range must not exceed 90 days. `to` must be after `from`.
      tags: [Transportation]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Availability status
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/AvailabilityResult'
        '400':
          description: Invalid date range (to must be after from, max 90 days)
        '404':
          description: Vehicle not found

  /transportation/bookings:
    post:
      summary: Create a transportation booking (15-minute hold)
      tags: [Transportation]
      x-nfr-hold-ttl: 900
      x-idempotency-key: true
      security:
        - bearerAuth: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookTransportationRequest'
      responses:
        '201':
          description: Booking created in HOLD status
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/BookingDetail'
        '400':
          description: Invalid request (BKNG_INVALID_DATE_RANGE)
        '401':
          description: Unauthorized
        '404':
          description: Vehicle not found (TRANS_NOT_FOUND)
        '409':
          description: Vehicle not available for selected dates (BKNG_CONFLICT)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    AcceptLanguage:
      name: Accept-Language
      in: header
      required: false
      schema:
        type: string
        enum: [en, zh, km]
        default: en

  schemas:
    Vehicle:
      type: object
      required: [id]
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [VAN, BUS, TUK_TUK, PRIVATE_CAR]
        name:
          type: string
        capacity:
          type: integer
        pricePerDayUsd:
          type: number
          nullable: true
        pricePerKmUsd:
          type: number
          nullable: true
        hasAc:
          type: boolean
        hasWifi:
          type: boolean
        luggageCapacity:
          type: string
        imageUrls:
          type: array
          items:
            type: string
        description:
          type: string
        ratingAverage:
          type: number
        ratingCount:
          type: integer
        status:
          type: string
          enum: [ACTIVE, INACTIVE]

    AvailabilityResult:
      type: object
      properties:
        isAvailable:
          type: boolean
        priceEstimateUsd:
          type: number
          nullable: true
        conflictingBookings:
          type: array
          items:
            type: object
            properties:
              startDate:
                type: string
                format: date
              endDate:
                type: string
                format: date

    PaginatedVehicles:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/Vehicle'
            total:
              type: integer
            page:
              type: integer
            limit:
              type: integer
            totalPages:
              type: integer

    BookTransportationRequest:
      type: object
      required: [vehicleId, startDate, endDate, pickupLocation, dropoffLocation]
      properties:
        vehicleId:
          type: string
          format: uuid
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        pickupLocation:
          type: string
          maxLength: 500
        dropoffLocation:
          type: string
          maxLength: 500
        stops:
          type: array
          items:
            type: string
        estimatedDistanceKm:
          type: number
          minimum: 0
        specialRequests:
          type: string
          maxLength: 1000

    BookingItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        bookingType:
          type: string
        resourceId:
          type: string
          format: uuid
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        quantity:
          type: integer
        unitPriceUsd:
          type: number
        subtotalUsd:
          type: number
        snapshot:
          type: object

    BookingDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        reference:
          type: string
        userId:
          type: string
          format: uuid
        method:
          type: string
          enum: [single, template]
        singleResourceKind:
          type: string
          nullable: true
        status:
          type: string
          enum: [HOLD, PENDING_PAYMENT, CONFIRMED, CANCELLED, EXPIRED]
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
          nullable: true
        totalUsd:
          type: number
        subtotalUsd:
          type: number
        discountUsd:
          type: number
        expiresAt:
          type: string
          format: date-time
        cancelledAt:
          type: string
          format: date-time
          nullable: true
        refundPercentage:
          type: integer
          nullable: true
        qrCodeUrl:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: '#/components/schemas/BookingItem'
