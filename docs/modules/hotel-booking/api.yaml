openapi: 3.0.3
info:
  title: DerLg — Hotel Booking API
  version: 1.0.0
  description: Hotel inventory, room availability, and hotel booking.

servers:
  - url: http://localhost:3001/v1
    description: Local development

paths:
  /hotels:
    get:
      summary: List hotels with filtering
      tags: [Hotels]
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - name: starRating
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 5
        - name: q
          in: query
          description: Free-text search (min 2 chars)
          schema:
            type: string
            minLength: 2
        - name: sort
          in: query
          schema:
            type: string
        - name: lang
          in: query
          schema:
            type: string
            enum: [en, zh, km]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 50
      responses:
        '200':
          description: Paginated list of hotels
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedHotels'

  /hotels/{id}:
    get:
      summary: Get hotel detail
      tags: [Hotels]
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Hotel detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/HotelDetail'
        '404':
          description: Hotel not found (HTL_NOT_FOUND)

  /hotels/{id}/rooms:
    get:
      summary: List rooms with availability for a date range
      tags: [Hotels]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: checkIn
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: checkOut
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: List of rooms with availability
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/RoomAvailability'
        '400':
          description: Invalid date range (checkOut must be after checkIn)

  /hotels/{hotelId}/bookings:
    post:
      summary: Create a hotel room booking (15-minute hold)
      tags: [Bookings]
      x-nfr-hold-ttl: 900
      x-idempotency-key: true
      security:
        - bearerAuth: []
      parameters:
        - name: hotelId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookHotelRoomRequest'
      responses:
        '201':
          description: Booking created in HOLD status
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/BookingDetail'
        '400':
          description: Invalid dates or exceeds max occupancy (BKNG_INVALID_DATE_RANGE, BKNG_EXCEEDS_OCCUPANCY)
        '401':
          description: Unauthorized
        '404':
          description: Hotel or room not found (HTL_NOT_FOUND, HTL_ROOM_NOT_FOUND)
        '409':
          description: Room not available for selected dates (BKNG_CONFLICT)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    AcceptLanguage:
      name: Accept-Language
      in: header
      required: false
      schema:
        type: string
        enum: [en, zh, km]
        default: en

  schemas:
    HotelSummary:
      type: object
      required: [id, starRating]
      properties:
        id:
          type: string
          format: uuid
        starRating:
          type: integer
          minimum: 1
          maximum: 5
        images:
          type: array
          items:
            type: string
        amenities:
          type: array
          items:
            type: string
        latitude:
          type: number
        longitude:
          type: number
        name:
          type: string
          description: Translated name (from translations)
        address:
          type: string
          description: Translated address (from translations)
        description:
          type: string
          description: Translated description (from translations)

    HotelDetail:
      $ref: '#/components/schemas/HotelSummary'

    RoomAvailability:
      type: object
      properties:
        id:
          type: string
          format: uuid
        roomType:
          type: string
        priceUsd:
          type: string
          description: Decimal price per night in USD
        maxOccupancy:
          type: integer
        isAvailable:
          type: boolean

    PaginatedHotels:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/HotelSummary'
            total:
              type: integer
            page:
              type: integer
            limit:
              type: integer
            totalPages:
              type: integer

    BookHotelRoomRequest:
      type: object
      required: [roomId, checkInDate, checkOutDate, guestsAdults]
      properties:
        roomId:
          type: string
          format: uuid
        checkInDate:
          type: string
          format: date
        checkOutDate:
          type: string
          format: date
        guestsAdults:
          type: integer
          minimum: 1
        guestsChildren:
          type: integer
          minimum: 0
          default: 0
        specialRequests:
          type: string
          maxLength: 1000

    BookingItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        bookingType:
          type: string
          enum: [hotel, guide, transportation, trip]
        resourceId:
          type: string
          format: uuid
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        quantity:
          type: integer
        unitPriceUsd:
          type: number
        subtotalUsd:
          type: number
        snapshot:
          type: object
          description: Immutable snapshot of resource details at booking time

    BookingDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        reference:
          type: string
          description: Human-readable reference (e.g. HTL-ABC123)
        userId:
          type: string
          format: uuid
        method:
          type: string
          enum: [single, template]
        singleResourceKind:
          type: string
          nullable: true
        tripTemplateId:
          type: string
          format: uuid
          nullable: true
        status:
          type: string
          enum: [HOLD, PENDING_PAYMENT, CONFIRMED, CANCELLED, EXPIRED]
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
          nullable: true
        totalUsd:
          type: number
        subtotalUsd:
          type: number
        discountUsd:
          type: number
        expiresAt:
          type: string
          format: date-time
          description: Hold expiry (15 minutes from creation)
        cancelledAt:
          type: string
          format: date-time
          nullable: true
        refundPercentage:
          type: integer
          nullable: true
        qrCodeUrl:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: '#/components/schemas/BookingItem'
