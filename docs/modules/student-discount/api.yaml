openapi: 3.0.3
info:
  title: DerLg — Student Discount API
  version: 1.0.0
  description: Student verification upload, status, and discount application.

servers:
  - url: http://localhost:3001/v1
    description: Local development

paths:
  /student-verification:
    post:
      summary: Submit student verification
      tags: [Student Verification]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [id_card_front, id_card_back, selfie]
              properties:
                id_card_front:
                  type: string
                  format: binary
                  description: Student ID card front (max 10MB, JPEG/PNG)
                id_card_back:
                  type: string
                  format: binary
                  description: Student ID card back (max 10MB, JPEG/PNG)
                selfie:
                  type: string
                  format: binary
                  description: Selfie holding ID (max 10MB, JPEG/PNG)
      responses:
        '201':
          description: Verification submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      verification_id:
                        type: string
                        format: uuid
                      status:
                        type: string
                        enum: [PENDING]
                      message:
                        type: string
        '400':
          description: Invalid images
        '429':
          description: Max attempts exceeded

    get:
      summary: Get current verification status
      tags: [Student Verification]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Verification status
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        enum: [NONE, PENDING, VERIFIED, REJECTED]
                      submitted_at:
                        type: string
                        format: date-time
                      verified_at:
                        type: string
                        format: date-time
                      expires_at:
                        type: string
                        format: date-time
                      rejection_reason:
                        type: string
                      attempt_count:
                        type: integer
                      discount_active:
                        type: boolean

  /admin/student-verifications:
    get:
      summary: Admin: list verification queue
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, VERIFIED, REJECTED]
            default: PENDING
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Verification queue
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                              format: uuid
                            user_id:
                              type: string
                              format: uuid
                            user_name:
                              type: string
                            user_email:
                              type: string
                            status:
                              type: string
                            submitted_at:
                              type: string
                              format: date-time
                            attempt_count:
                              type: integer
                      total:
                        type: integer

  /admin/student-verifications/{id}/approve:
    post:
      summary: Admin: approve verification
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Approved

  /admin/student-verifications/{id}/reject:
    post:
      summary: Admin: reject verification
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  maxLength: 500
      responses:
        '200':
          description: Rejected

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
