openapi: 3.0.3
info:
  title: DerLg — Explore Places API
  version: 1.0.0
  description: Places directory, map data, and nearby search.

servers:
  - url: http://localhost:3001/v1
    description: Local development

paths:
  /places:
    get:
      summary: List places with filtering
      tags: [Places]
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - name: category
          in: query
          schema:
            type: string
            enum: [Temple, Museum, Nature, Market, Beach, Mountain, Other]
        - name: province
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [popularity, name_asc, name_desc]
            default: popularity
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 50
      responses:
        '200':
          description: Paginated list of places
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/PlaceSummary'
                      total:
                        type: integer
                      page:
                        type: integer
                      limit:
                        type: integer

  /places/{slug}:
    get:
      summary: Get place detail by slug
      tags: [Places]
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Place detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/PlaceDetail'
        '404':
          description: Place not found

  /places/{slug}/nearby:
    get:
      summary: Get places near a specific place
      tags: [Places]
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: radius
          in: query
          schema:
            type: integer
            default: 5000
            description: Radius in meters
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
            maximum: 50
      responses:
        '200':
          description: Nearby places
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/PlaceSummary'

  /places/nearby:
    get:
      summary: Get places near coordinates
      tags: [Places]
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - name: lat
          in: query
          required: true
          schema:
            type: number
            minimum: -90
            maximum: 90
        - name: lng
          in: query
          required: true
          schema:
            type: number
            minimum: -180
            maximum: 180
        - name: radius
          in: query
          schema:
            type: integer
            default: 5000
        - name: category
          in: query
          schema:
            type: string
            enum: [Temple, Museum, Nature, Market, Beach, Mountain, Other]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 50
      responses:
        '200':
          description: Nearby places sorted by distance
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      allOf:
                        - $ref: '#/components/schemas/PlaceSummary'
                        - type: object
                          properties:
                            distance_meters:
                              type: integer

components:
  parameters:
    AcceptLanguage:
      name: Accept-Language
      in: header
      required: false
      schema:
        type: string
        default: en

  schemas:
    PlaceSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        cover_image_url:
          type: string
          format: uri
        category:
          type: string
        province:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        rating_average:
          type: number
        rating_count:
          type: integer
        entry_fee_usd:
          type: number
          nullable: true

    PlaceDetail:
      allOf:
        - $ref: '#/components/schemas/PlaceSummary'
        - type: object
          properties:
            description:
              type: string
            visitor_tips:
              type: string
            dress_code:
              type: string
            gallery_image_urls:
              type: array
              items:
                type: string
                format: uri
            opening_hours:
              type: object
              properties:
                monday:
                  type: string
                tuesday:
                  type: string
                wednesday:
                  type: string
                thursday:
                  type: string
                friday:
                  type: string
                saturday:
                  type: string
                sunday:
                  type: string
            status:
              type: string
              enum: [ACTIVE, INACTIVE]
