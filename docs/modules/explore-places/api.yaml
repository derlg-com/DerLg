openapi: 3.0.3
info:
  title: DerLg — Explore Places API
  version: 1.0.0
  description: Places directory, map data, and nearby search.

servers:
  - url: http://localhost:3001/v1
    description: Local development

paths:
  /places:
    get:
      summary: List places with filtering
      description: |
        Returns a paginated list of places. Supports filtering by category, province,
        and sorting by popularity or name. Results are locale-aware via the
        Accept-Language header.
      tags: [Places]
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - name: category
          in: query
          description: Filter by place category
          schema:
            type: string
            enum: [Temple, Museum, Nature, Market, Beach, Mountain, Other]
        - name: province
          in: query
          description: Filter by Cambodia province
          schema:
            type: string
        - name: sort
          in: query
          description: Sort order for results
          schema:
            type: string
            enum: [popularity, name_asc, name_desc]
            default: popularity
        - name: page
          in: query
          description: Page number (1-based)
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          description: Number of items per page
          schema:
            type: integer
            default: 20
            maximum: 50
            minimum: 1
      responses:
        '200':
          description: Paginated list of places
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    required: [items, total, page, limit]
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/PlaceSummary'
                      total:
                        type: integer
                      page:
                        type: integer
                      limit:
                        type: integer
        '400':
          $ref: '#/components/responses/BadRequest'

  /places/{slug}:
    get:
      summary: Get place detail by slug
      description: |
        Returns full details for a single place including description, visitor tips,
        dress code, opening hours, gallery, and GPS coordinates.
      tags: [Places]
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - name: slug
          in: path
          required: true
          description: URL-friendly unique identifier for the place
          schema:
            type: string
      responses:
        '200':
          description: Place detail
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/PlaceDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  /places/{slug}/related:
    get:
      summary: Get related places
      description: |
        Returns places in the same category or province as the given place.
        Useful for "You may also like" sections on place detail pages.
      tags: [Places]
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - name: slug
          in: path
          required: true
          description: URL-friendly unique identifier for the place
          schema:
            type: string
        - name: limit
          in: query
          description: Maximum number of related places to return
          schema:
            type: integer
            default: 6
            maximum: 20
            minimum: 1
      responses:
        '200':
          description: List of related places
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/PlaceSummary'
        '404':
          $ref: '#/components/responses/NotFound'

  /places/{slug}/nearby-trips:
    get:
      summary: Get trips that include this place
      description: |
        Returns trips from the trip catalog that include the given place in their
        itinerary. Useful for "Explore trips that visit this place" sections.
      tags: [Places]
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - name: slug
          in: path
          required: true
          description: URL-friendly unique identifier for the place
          schema:
            type: string
        - name: limit
          in: query
          description: Maximum number of trips to return
          schema:
            type: integer
            default: 6
            maximum: 20
            minimum: 1
      responses:
        '200':
          description: List of trips that include this place
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TripBrief'
        '404':
          $ref: '#/components/responses/NotFound'

  /places/{slug}/nearby:
    get:
      summary: Get places near a specific place
      description: |
        Returns places within a given radius (in meters) of the specified place,
        sorted by distance. Uses the place's own coordinates as the center point.
      tags: [Places]
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - name: slug
          in: path
          required: true
          description: URL-friendly unique identifier for the place
          schema:
            type: string
        - name: radius
          in: query
          description: Search radius in meters
          schema:
            type: integer
            default: 5000
            minimum: 100
            maximum: 50000
        - name: limit
          in: query
          description: Maximum number of nearby places to return
          schema:
            type: integer
            default: 10
            maximum: 50
            minimum: 1
      responses:
        '200':
          description: Nearby places sorted by distance
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      allOf:
                        - $ref: '#/components/schemas/PlaceSummary'
                        - type: object
                          properties:
                            distance_meters:
                              type: integer
                              description: Distance from the center place in meters
        '404':
          $ref: '#/components/responses/NotFound'

  /places/nearby:
    get:
      summary: Get places near coordinates
      description: |
        Returns places within a given radius of specific GPS coordinates,
        sorted by distance. Supports optional category filtering.
      tags: [Places]
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - name: lat
          in: query
          required: true
          description: Latitude (-90 to 90)
          schema:
            type: number
            minimum: -90
            maximum: 90
        - name: lng
          in: query
          required: true
          description: Longitude (-180 to 180)
          schema:
            type: number
            minimum: -180
            maximum: 180
        - name: radius
          in: query
          description: Search radius in meters
          schema:
            type: integer
            default: 5000
            minimum: 100
            maximum: 50000
        - name: category
          in: query
          description: Filter by place category
          schema:
            type: string
            enum: [Temple, Museum, Nature, Market, Beach, Mountain, Other]
        - name: limit
          in: query
          description: Maximum number of places to return
          schema:
            type: integer
            default: 20
            maximum: 50
            minimum: 1
      responses:
        '200':
          description: Nearby places sorted by distance
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      allOf:
                        - $ref: '#/components/schemas/PlaceSummary'
                        - type: object
                          properties:
                            distance_meters:
                              type: integer
                              description: Distance from query coordinates in meters
        '400':
          $ref: '#/components/responses/BadRequest'

components:
  parameters:
    AcceptLanguage:
      name: Accept-Language
      in: header
      required: false
      description: Preferred language for localized content
      schema:
        type: string
        enum: [en, zh, km]
        default: en

  schemas:
    PlaceSummary:
      type: object
      required: [id, slug, name, category, province, latitude, longitude]
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        cover_image_url:
          type: string
          format: uri
        category:
          type: string
          enum: [Temple, Museum, Nature, Market, Beach, Mountain, Other]
        province:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        rating_average:
          type: number
        rating_count:
          type: integer
        entry_fee_usd:
          type: number
          nullable: true
          description: Entry fee in USD; null if free entry

    PlaceDetail:
      allOf:
        - $ref: '#/components/schemas/PlaceSummary'
        - type: object
          required: [description, status]
          properties:
            description:
              type: string
            visitor_tips:
              type: string
            dress_code:
              type: string
            gallery_image_urls:
              type: array
              items:
                type: string
                format: uri
              description: Up to 15 gallery images
            opening_hours:
              type: object
              properties:
                monday:
                  type: string
                tuesday:
                  type: string
                wednesday:
                  type: string
                thursday:
                  type: string
                friday:
                  type: string
                saturday:
                  type: string
                sunday:
                  type: string
            status:
              type: string
              enum: [ACTIVE, INACTIVE]
              description: ACTIVE places are visible to users; INACTIVE places are hidden

    TripBrief:
      type: object
      required: [id, slug, name, cover_image_url, duration_days, price_from_usd]
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        cover_image_url:
          type: string
          format: uri
        duration_days:
          type: integer
        price_from_usd:
          type: number
        rating_average:
          type: number

  responses:
    BadRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            type: object
            required: [success, error]
            properties:
              success:
                type: boolean
                example: false
              error:
                type: object
                properties:
                  code:
                    type: string
                  message:
                    type: string

    NotFound:
      description: Place not found
      content:
        application/json:
          schema:
            type: object
            required: [success, error]
            properties:
              success:
                type: boolean
                example: false
              error:
                type: object
                properties:
                  code:
                    type: string
                    example: PLACE_001
                  message:
                    type: string
