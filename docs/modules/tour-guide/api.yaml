openapi: 3.0.3
info:
  title: DerLg — Tour Guide API
  version: 1.0.0
  description: Guide directory, profiles, availability, and guide booking.

servers:
  - url: http://localhost:3001/v1
    description: Local development

paths:
  /guides:
    get:
      summary: List tour guides with filtering
      tags: [Guides]
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - name: language
          in: query
          description: Filter by spoken language (SupportedLanguage enum from DB)
          schema:
            type: string
        - name: speciality
          in: query
          description: Filter by guide speciality
          schema:
            type: string
        - name: q
          in: query
          description: Free-text search (min 2 chars)
          schema:
            type: string
            minLength: 2
        - name: sort
          in: query
          schema:
            type: string
        - name: lang
          in: query
          schema:
            type: string
            enum: [en, zh, km]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 50
      responses:
        '200':
          description: Paginated list of guides
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedGuides'

  /guides/{id}:
    get:
      summary: Get guide profile detail
      tags: [Guides]
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Guide profile detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/GuideDetail'
        '404':
          description: Guide not found (GUIDE_NOT_FOUND)

  /guides/{id}/availability:
    get:
      summary: Check guide availability for date range
      description: |
        Check if a specific guide is available for the given date range.
        Date range must not exceed 90 days. `to` must be after `from`.
      tags: [Guides]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Availability status and pricing estimate
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/AvailabilityResult'
        '400':
          description: Invalid date range (to must be after from, max 90 days)
        '404':
          description: Guide not found

  /guides/{guideId}/bookings:
    post:
      summary: Create a guide booking (15-minute hold)
      tags: [Bookings]
      x-nfr-hold-ttl: 900
      x-idempotency-key: true
      security:
        - bearerAuth: []
      parameters:
        - name: guideId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookGuideRequest'
      responses:
        '201':
          description: Booking created in HOLD status
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/BookingDetail'
        '400':
          description: Invalid date range (BKNG_INVALID_DATE_RANGE)
        '401':
          description: Unauthorized
        '404':
          description: Guide not found (GUIDE_NOT_FOUND)
        '409':
          description: Guide not available for selected dates (BKNG_CONFLICT)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    AcceptLanguage:
      name: Accept-Language
      in: header
      required: false
      schema:
        type: string
        enum: [en, zh, km]
        default: en

  schemas:
    GuideSummary:
      type: object
      required: [id]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        profilePicture:
          type: string
          format: uri
        languages:
          type: array
          items:
            type: string
        specialities:
          type: array
          items:
            type: string
        location:
          type: string
        pricePerDayUsd:
          type: number
        isVerified:
          type: boolean
        ratingAverage:
          type: number
        ratingCount:
          type: integer

    GuideDetail:
      allOf:
        - $ref: '#/components/schemas/GuideSummary'
        - type: object
          properties:
            bio:
              type: string
            experienceYears:
              type: integer
            certifications:
              type: array
              items:
                type: string
            galleryImageUrls:
              type: array
              items:
                type: string
                format: uri
            status:
              type: string
              enum: [ACTIVE, INACTIVE, SUSPENDED]

    AvailabilityResult:
      type: object
      properties:
        isAvailable:
          type: boolean
        priceEstimateUsd:
          type: number
          nullable: true
        conflictingBookings:
          type: array
          items:
            type: object
            properties:
              startDate:
                type: string
                format: date
              endDate:
                type: string
                format: date

    PaginatedGuides:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/GuideSummary'
            total:
              type: integer
            page:
              type: integer
            limit:
              type: integer
            totalPages:
              type: integer

    BookGuideRequest:
      type: object
      required: [startDate, endDate]
      properties:
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        linkedTripBookingId:
          type: string
          format: uuid
          nullable: true
        specialRequests:
          type: string
          maxLength: 1000

    BookingItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        bookingType:
          type: string
        resourceId:
          type: string
          format: uuid
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        quantity:
          type: integer
        unitPriceUsd:
          type: number
        subtotalUsd:
          type: number
        snapshot:
          type: object

    BookingDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        reference:
          type: string
        userId:
          type: string
          format: uuid
        method:
          type: string
          enum: [single, template]
        singleResourceKind:
          type: string
          nullable: true
        status:
          type: string
          enum: [HOLD, PENDING_PAYMENT, CONFIRMED, CANCELLED, EXPIRED]
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
          nullable: true
        totalUsd:
          type: number
        subtotalUsd:
          type: number
        discountUsd:
          type: number
        expiresAt:
          type: string
          format: date-time
        cancelledAt:
          type: string
          format: date-time
          nullable: true
        refundPercentage:
          type: integer
          nullable: true
        qrCodeUrl:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: '#/components/schemas/BookingItem'
