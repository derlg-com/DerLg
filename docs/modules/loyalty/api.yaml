openapi: 3.0.3
info:
  title: DerLg — Loyalty API
  version: 1.0.0
  description: Loyalty points balance, history, and redemption.

servers:
  - url: http://localhost:3001/v1
    description: Local development

paths:
  /loyalty/balance:
    get:
      summary: Get current loyalty points balance
      tags: [Loyalty]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Points balance
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      balance:
                        type: integer
                      equivalent_usd:
                        type: number
                      expiry_warning:
                        type: object
                        properties:
                          points_expiring_soon:
                            type: integer
                          expiry_date:
                            type: string
                            format: date

  /loyalty/transactions:
    get:
      summary: Get loyalty transaction history
      tags: [Loyalty]
      security:
        - bearerAuth: []
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [EARNED, REDEEMED, ADJUSTED, EXPIRED]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 50
      responses:
        '200':
          description: Paginated transactions
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/LoyaltyTransaction'
                      total:
                        type: integer
                      page:
                        type: integer
                      limit:
                        type: integer

  /loyalty/redeem:
    post:
      summary: Calculate redemption value (validation)
      tags: [Loyalty]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [points, subtotal_usd]
              properties:
                points:
                  type: integer
                  minimum: 100
                  multipleOf: 100
                subtotal_usd:
                  type: number
      responses:
        '200':
          description: Redemption calculation
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      points_used:
                        type: integer
                      discount_usd:
                        type: number
                      remaining_balance:
                        type: integer
                      is_valid:
                        type: boolean
                      message:
                        type: string

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LoyaltyTransaction:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [EARNED, REDEEMED, ADJUSTED, EXPIRED]
        amount:
          type: integer
        description:
          type: string
        booking_reference:
          type: string
        balance_after:
          type: integer
        created_at:
          type: string
          format: date-time
